<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siffer Giftyy // The Celestial Gateway</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-cyan: #00f0ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #020205;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
        }

        /* 3D Graphics Viewport Layer */
        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Premium Minimalist Interface Layer Overlay */
        .interface-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            pointer-events: none; /* Let clicks pass into the 3D world below */
        }

        .header-brand {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        .center-cta {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            pointer-events: auto; /* Re-enable clicks specifically for entering */
            cursor: pointer;
        }

        .poetic-prompt {
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: #fff;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            max-width: 80%;
            line-height: 1.6;
        }

        .action-btn {
            background: transparent;
            border: 1px solid rgba(255, 0, 127, 0.4);
            color: var(--neon-pink);
            padding: 12px 30px;
            font-size: 0.75rem;
            letter-spacing: 3px;
            border-radius: 30px;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.1);
        }

        .center-cta:hover .action-btn {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 25px var(--neon-pink);
            border-color: var(--neon-pink);
        }

        .footer-metrics {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="webgl-container"></div>

    <div class="interface-overlay">
        <div class="header-brand">SYSTEM // SIFFER.GIFTYY.INIT</div>
        
        <div class="center-cta" onclick="triggerCinematicWarp()">
            <p class="poetic-prompt">"A universe of floating thoughts, locked away just for you."</p>
            <button class="action-btn">Unseal Reality</button>
        </div>

        <div class="footer-metrics">[ WEBGL_CORE_CONNECTED // 60FPS ]</div>
    </div>

    <script>
        // --- THREE.JS INITIALIZATION ARCHITECTURE ---
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- BACKGROUND COSMIC NEBULA SPACE SYSTEM ---
        const particleCount = 2500;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i += 3) {
            // Scatter space data maps
            positions[i] = (Math.random() - 0.5) * 12;
            positions[i+1] = (Math.random() - 0.5) * 12;
            positions[i+2] = (Math.random() - 0.5) * 8;

            // Fluid palette mixing (Neon Pinks fading down to soft Cyans)
            const mix = Math.random();
            colors[i] = mix > 0.4 ? 1.0 : 0.0;     // R
            colors[i+1] = mix > 0.4 ? 0.0 : 0.85;   // G
            colors[i+2] = mix > 0.4 ? 0.5 : 1.0;    // B
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Create sleek circular laser stardust materials
        const pCanvas = document.createElement('canvas'); pCanvas.width = 16; pCanvas.height = 16;
        const pCtx = pCanvas.getContext('2d');
        const grad = pCtx.createRadialGradient(8, 8, 0, 8, 8, 8);
        grad.addColorStop(0, 'rgba(255,255,255,1)');
        grad.addColorStop(0.3, 'rgba(255,0,127,0.6)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        pCtx.fillStyle = grad; pCtx.fillRect(0, 0, 16, 16);
        const pTexture = new THREE.CanvasTexture(pCanvas);

        const particleMaterial = new THREE.PointsMaterial({
            size: 0.05, map: pTexture, vertexColors: true,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });

        const starField = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(starField);

        // --- CENTERPIECE: THE 3D VELVET CRYPTO BOX ---
        const boxGeometry = new THREE.IcosahedronGeometry(0.8, 1); // Premium polygon look instead of a basic square box
        const boxMaterial = new THREE.MeshBasicMaterial({
            color: 0xff007f,
            wireframe: true,
            transparent: true,
            opacity: 0.4
        });
        const cryptoBox = new THREE.Mesh(boxGeometry, boxMaterial);
        scene.add(cryptoBox);

        // Inner white-hot plasma nucleus thread
        const coreGeometry = new THREE.IcosahedronGeometry(0.3, 0);
        const coreMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
        const coreMesh = new THREE.Mesh(coreGeometry, coreMaterial);
        cryptoBox.add(coreMesh);

        // --- PHYSICS ANIMATION LOOP RUNTIME ---
        const clock = new THREE.Clock();

        function renderEngineTick() {
            requestAnimationFrame(renderEngineTick);
            const time = clock.getElapsedTime();

            // Zero-gravity lazy rotation loops
            cryptoBox.rotation.y = time * 0.3;
            cryptoBox.rotation.x = time * 0.15;
            cryptoBox.position.y = Math.sin(time * 1.5) * 0.12; // Floating bounce amplitude

            // Drift the starfield back maps slowly
            starField.rotation.z = time * 0.02;

            renderer.render(scene, camera);
        }
        renderEngineTick();

        // --- GSAP HIGH-END CINEMATIC WARP EXPLOSION TRIGGER ---
        let isWarping = false;

        function triggerCinematicWarp() {
            if (isWarping) return;
            isWarping = true;

            // 1. Fade out the text titles cleanly
            gsap.to('.interface-overlay', {
                opacity: 0, duration: 0.8, y: -30, ease: "power4.in"
            });

            // 2. Animate the 3D centerpiece collapsing inwards before the explosion
            gsap.to(cryptoBox.scale, {
                x: 0.1, y: 0.1, z: 0.1, duration: 0.4, ease: "back.in(2)",
                onComplete: () => {
                    // Make it invisible once it collapses down completely
                    cryptoBox.visible = false;
                }
            });

            // 3. THE WARP ENGINE BURST: Accelerate camera depth right through the stardust field!
            gsap.to(camera.position, {
                z: -5, duration: 2.2, ease: "power4.inOut",
                onUpdate: () => {
                    // Pull the starfield rotation into hyperspeed as the camera speeds through
                    starField.rotation.y += 0.05;
                },
                onComplete: () => {
                    // This is where Phase 2 initiates! We wipe background data or relocate windows.
                    document.body.style.backgroundColor = "#000";
                    alert("THE MATRIX UNSEALED: Ready to load the Atelier Room!");
                }
            });
        }

        // Window resize event controller matrix
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
